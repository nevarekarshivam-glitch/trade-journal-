<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0d0f0d"/>
<title>Trade Journal · XAUUSD</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0d0f0d;color:#d4d8d4;font-family:'Courier New',Courier,monospace;font-size:13px;min-height:100vh;overscroll-behavior:none;}
input,select,textarea,button{font-family:inherit;font-size:13px;outline:none;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5);}
#header{padding:18px 20px 10px;border-bottom:1px solid #1a221a;position:sticky;top:0;background:#0d0f0d;z-index:10;}
.eyebrow{color:#22c55e;font-size:10px;letter-spacing:.15em;margin-bottom:4px;}
.app-title{font-size:22px;font-weight:800;color:#f0f4f0;letter-spacing:-.02em;}
.subrow{display:flex;align-items:center;gap:12px;margin-top:8px;}
.trade-count{color:#4a5a4a;font-size:12px;}
.export-btn{padding:6px 14px;border-radius:8px;border:1px solid #1e3a1e;background:#101810;color:#22c55e;font-size:11px;cursor:pointer;letter-spacing:.05em;}
#tabs{display:flex;padding:0 20px;border-bottom:1px solid #1a221a;background:#0d0f0d;position:sticky;top:61px;z-index:9;}
.tab-btn{padding:12px 0;margin-right:24px;font-size:11px;letter-spacing:.1em;cursor:pointer;border:none;background:transparent;color:#3a4a3a;border-bottom:2px solid transparent;font-weight:600;font-family:inherit;}
.tab-btn.active{color:#22c55e;border-bottom:2px solid #22c55e;}
#body{padding:20px;max-width:600px;margin:0 auto;padding-bottom:40px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.card{background:#111511;border:1px solid #1a221a;border-radius:10px;padding:14px 14px 12px;}
.card.highlight{background:#0a160a;border-color:#22c55e;}
.card-label{font-size:9px;letter-spacing:.12em;color:#3a5a3a;margin-bottom:6px;}
.card-val{font-size:26px;font-weight:800;color:#e8f0e8;line-height:1.1;}
.card-val.green{color:#22c55e;}
.card-val.sm{font-size:18px;font-weight:700;}
.card-val.md{font-size:22px;}
.card-sub{font-size:10px;color:#3a5a3a;margin-top:4px;}
.pips-unit{font-size:16px;color:#22c55e;font-weight:800;display:block;}
.progress-bar{height:3px;background:#1a221a;border-radius:2px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;background:#22c55e;border-radius:2px;transition:width .3s;}
.day-chart{background:#111511;border:1px solid #1a221a;border-radius:10px;padding:14px 14px 12px;margin-bottom:10px;}
.day-bars{display:flex;gap:6px;align-items:flex-end;height:100px;}
.day-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.day-bar-wrap{width:100%;height:58px;display:flex;align-items:flex-end;}
.day-bar{width:100%;border-radius:3px 3px 0 0;transition:height .3s;background:#1a2a1a;}
.day-bar.has-data{background:#22c55e;}
.day-pct{font-size:10px;font-weight:700;color:#3a5a3a;}
.day-pct.has-data{color:#22c55e;}
.day-frac{font-size:9px;color:#3a5a3a;}
.day-name{font-size:9px;letter-spacing:.08em;color:#3a5a3a;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.field-label{font-size:9px;letter-spacing:.12em;color:#3a5a3a;margin-bottom:5px;}
.f-input{width:100%;background:#111511;border:1px solid #1a221a;border-radius:8px;padding:10px 12px;color:#d4d8d4;}
.f-input:focus{
